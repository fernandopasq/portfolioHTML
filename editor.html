<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Editor Offline - Projetos</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/editor.css" />
    <style>
      /* garantir espaço abaixo do header fixo */
      main {
        padding-top: 5.5rem;
      }
      .controls {
        margin-top: 1rem;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container">
        <h1>Editor Offline de Projetos</h1>
      </div>
    </header>

    <main>
      <div class="container editor">
        <div class="controls">
          <button id="btnOpenFolder">Conectar Pasta do Projeto</button>
          <div id="postConnectControls" class="hidden">
            <label class="category-select-label">
              Categoria
              <select id="manageCategorySelect">
                <option value="prototipos-e-maquetes">
                  Protótipos e Maquetes
                </option>
                <option value="pecas-personalizadas">
                  Peças Personalizadas
                </option>
                <option value="figuras-artisticas">Figuras Artísticas</option>
                <option value="modelagem-3d">Modelagem 3D</option>
                <option value="texturizacao">Texturização</option>
                <option value="renderizacao">Renderização</option>
              </select>
            </label>
            <button id="btnManage">Gerenciar Projetos Existentes</button>
            <button id="btnAddNew">Adicionar Novo Projeto</button>
          </div>
          <button id="btnLoad" class="hidden">Carregar projetos.json</button>
          <button id="btnSave" disabled class="hidden">
            Salvar projetos.json
          </button>
          <button id="btnExport" disabled class="hidden">Exportar JSON</button>
          <div id="status" class="status">Não conectado</div>
        </div>

        <section id="editorArea" class="editor-panel hidden">
          <div class="left">
            <h2>Projetos</h2>
            <ul id="projectsList" class="projects-list"></ul>
          </div>

          <div class="right">
            <h2 id="formTitle">Editar / Adicionar</h2>
            <form id="projectForm">
              <label>Título<input id="title" required /></label>
              <label>ID (slug)<input id="id" required /></label>
              <label>Descrição<textarea id="description"></textarea></label>
              <label
                >Categoria
                <select id="categorySelect">
                  <option value="prototipos-e-maquetes">
                    Protótipos e Maquetes
                  </option>
                  <option value="pecas-personalizadas">
                    Peças Personalizadas
                  </option>
                  <option value="figuras-artisticas">Figuras Artísticas</option>
                  <option value="modelagem-3d">Modelagem 3D</option>
                  <option value="texturizacao">Texturização</option>
                  <option value="renderizacao">Renderização</option>
                </select>
              </label>
              <label>Imagens (lista abaixo)</label>
              <div class="images-controls">
                <ul id="imagesList" class="images-list"></ul>
                <div class="images-buttons">
                  <button id="btnAddImage">Adicionar Imagem (copiar)</button>
                  <input
                    id="imagePath"
                    placeholder="ou digite caminho relativo"
                  />
                </div>
              </div>

              <div class="form-actions">
                <button id="btnAddSave">Salvar Projeto</button>
                <button id="btnDelete" class="danger">Remover Projeto</button>
              </div>
            </form>
          </div>
        </section>
      </div>
    </main>

    <script src="js/editor.js"></script>
  </body>
</html>
